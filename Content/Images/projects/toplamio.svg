<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Toplamio projesi görseli">
  <defs>
    <linearGradient id="g_top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E8A6A"/>
      <stop offset="1" stop-color="#C7A354"/>
    </linearGradient>
    <radialGradient id="glow_top" cx="0.72" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#1E8A6A" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1E8A6A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft_top" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="#0E0E13"/>
  <rect width="1200" height="750" fill="url(#glow_top)"/>
  <circle cx="980" cy="120" r="220" fill="#1E8A6A" opacity="0.30" filter="url(#soft_top)"/>
  <circle cx="170" cy="640" r="180" fill="#C7A354" opacity="0.20" filter="url(#soft_top)"/>

  <!-- app window -->
  <g>
    <rect x="150" y="150" width="900" height="470" rx="26" fill="#15151B" stroke="#2A2A34" stroke-width="1.5"/>
    <path d="M150 176 a26 26 0 0 1 26 -26 h848 a26 26 0 0 1 26 26 v46 h-900 z" fill="#1C1C24"/>
    <circle cx="188" cy="199" r="8" fill="#3A3A46"/>
    <circle cx="216" cy="199" r="8" fill="#3A3A46"/>
    <circle cx="244" cy="199" r="8" fill="#3A3A46"/>
    <rect x="300" y="188" width="520" height="22" rx="11" fill="#22222C"/>

    <!-- hesaplayıcı formu: iki giriş + Hesapla butonu -->
    <rect x="196" y="256" width="180" height="16" rx="8" fill="#33333E"/>
    <rect x="196" y="286" width="386" height="46" rx="12" fill="#22222B" stroke="#2E2E38"/>
    <rect x="214" y="302" width="120" height="14" rx="7" fill="#3A3A46"/>
    <rect x="614" y="286" width="386" height="46" rx="12" fill="#22222B" stroke="#2E2E38"/>
    <rect x="632" y="302" width="150" height="14" rx="7" fill="#3A3A46"/>
    <rect x="196" y="356" width="180" height="46" rx="12" fill="url(#g_top)"/>
    <rect x="226" y="372" width="120" height="14" rx="7" fill="#ffffff" opacity="0.92"/>

    <!-- sonuç kartı -->
    <rect x="196" y="430" width="804" height="76" rx="14" fill="#182420" stroke="#1E8A6A" stroke-width="1.5"/>
    <rect x="220" y="452" width="150" height="12" rx="6" fill="#3E5A50"/>
    <rect x="220" y="474" width="230" height="16" rx="8" fill="url(#g_top)"/>
    <rect x="800" y="456" width="176" height="26" rx="13" fill="#C7A354" opacity="0.85"/>

    <!-- alt sıra: küçük araç kartları -->
    <rect x="196" y="530" width="252" height="72" rx="12" fill="#22222B" stroke="#2E2E38"/>
    <rect x="216" y="552" width="110" height="12" rx="6" fill="#3A3A46"/>
    <rect x="216" y="574" width="170" height="10" rx="5" fill="#33333E"/>
    <rect x="472" y="530" width="252" height="72" rx="12" fill="#22222B" stroke="#2E2E38"/>
    <rect x="492" y="552" width="110" height="12" rx="6" fill="#3A3A46"/>
    <rect x="492" y="574" width="170" height="10" rx="5" fill="#33333E"/>
    <rect x="748" y="530" width="252" height="72" rx="12" fill="#22222B" stroke="#2E2E38"/>
    <rect x="768" y="552" width="110" height="12" rx="6" fill="#3A3A46"/>
    <rect x="768" y="574" width="170" height="10" rx="5" fill="#33333E"/>
  </g>

  <!-- badge -->
  <g>
    <rect x="150" y="656" width="220" height="44" rx="22" fill="#16161C" stroke="#2A2A34"/>
    <circle cx="176" cy="678" r="5" fill="#1E8A6A"/>
    <text x="192" y="684" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="600" fill="#C7C7D1">toplamio.com · SaaS</text>
  </g>
  <!-- big monogram -->
  <text x="1050" y="700" text-anchor="end" font-family="Syne, Inter, sans-serif" font-size="150" font-weight="800" fill="url(#g_top)" opacity="0.9">T</text>
</svg>
